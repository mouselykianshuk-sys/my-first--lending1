<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Панель управления</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#050505] text-white flex items-center justify-center min-h-screen">
    <div id="login-box" class="p-10 border border-[#222] rounded-2xl bg-[#111] text-center">
        <h1 class="text-2xl font-bold mb-6 uppercase tracking-widest">Admin Access</h1>
        <input type="password" id="pass" placeholder="Пароль" class="bg-[#1a1a1a] border border-[#333] p-3 rounded mb-4 w-full text-center">
        <button onclick="check()" class="bg-white text-black px-6 py-2 font-bold uppercase text-xs w-full">Войти</button>
    </div>

    <div id="content" class="hidden p-10 border border-[#222] rounded-2xl bg-[#111] max-w-md">
        <h1 class="text-xl font-bold mb-4 text-green-500">Доступ разрешен</h1>
        <p class="text-gray-400 text-sm mb-6">Теперь вы можете перейти к редактированию файлов напрямую на GitHub:</p>
        <a href="https://github.com" target="_blank" class="block bg-blue-600 p-3 text-center rounded font-bold">РЕДАКТИРОВАТЬ ФАЙЛЫ</a>
    </div>

    <script>
        function check() {
            const p = document.getElementById('pass').value;
            if (p === '1234') { // Твой пароль
                document.getElementById('login-box').classList.add('hidden');
                document.getElementById('content').classList.remove('hidden');
            } else {
                alert('Неверно!');
            }
        }
    </script>
</body>
</html>
